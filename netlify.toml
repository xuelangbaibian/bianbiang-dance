[build]
  command = "npm run build"

[build.environment]
  NODE_VERSION = "20"

[context.production]
  command = "npm run build"

# 图像优化（使用Netlify Images）
[[headers]]
  for = "/*.{jpg,jpeg,png,webp,gif,svg}"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.{css,js,woff,woff2}"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

# 压缩HTML
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=3600"